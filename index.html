<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Navy Blue Calculator</title>

<style>
    body {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background: #0a192f; /* Navy background */
        font-family: Arial, sans-serif;
    }

    .calculator {
        background: #112240; /* Dark navy */
        padding: 20px;
        border-radius: 12px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.4);
        width: 320px;
    }

    .display {
        width: 100%;
        height: 60px;
        background: #0f3057; /* Deep blue */
        color: #64b5f6; /* Light blue text */
        text-align: right;
        padding: 10px;
        font-size: 26px;
        border: none;
        border-radius: 8px;
        margin-bottom: 15px;
        box-sizing: border-box;
    }

    .buttons {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 10px;
    }

    button {
        padding: 15px;
        font-size: 18px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        background: #1b3a6b; /* Blue buttons */
        color: #ffffff;
        transition: 0.2s;
    }

    button:hover {
        background: #274c8e;
    }

    .operator {
        background: #1e56a0; /* Brighter blue */
    }

    .operator:hover {
        background: #2f6fcb;
    }

    .equal {
        background: #0d6efd; /* Strong blue */
        grid-column: span 2;
    }

    .equal:hover {
        background: #0b5ed7;
    }

    .clear {
        background: #102a43; /* Navy shade */
    }

    .clear:hover {
        background: #1c3d5a;
    }
</style>
</head>

<body>

<div class="calculator">
    <input type="text" class="display" id="display" disabled>

    <div class="buttons">
        <button class="clear" onclick="clearDisplay()">C</button>
        <button onclick="deleteLast()">DEL</button>
        <button class="operator" onclick="appendValue('%')">%</button>
        <button class="operator" onclick="appendValue('/')">÷</button>

        <button onclick="appendValue('7')">7</button>
        <button onclick="appendValue('8')">8</button>
        <button onclick="appendValue('9')">9</button>
        <button class="operator" onclick="appendValue('*')">×</button>

        <button onclick="appendValue('4')">4</button>
        <button onclick="appendValue('5')">5</button>
        <button onclick="appendValue('6')">6</button>
        <button class="operator" onclick="appendValue('-')">−</button>

        <button onclick="appendValue('1')">1</button>
        <button onclick="appendValue('2')">2</button>
        <button onclick="appendValue('3')">3</button>
        <button class="operator" onclick="appendValue('+')">+</button>

        <button onclick="appendValue('0')">0</button>
        <button onclick="appendValue('.')">.</button>
        <button class="equal" onclick="calculate()">=</button>
    </div>
</div>

<script>
    const display = document.getElementById("display");

    function appendValue(value) {
        display.value += value;
    }

    function clearDisplay() {
        display.value = "";
    }

    function deleteLast() {
        display.value = display.value.slice(0, -1);
    }

    function calculate() {
        try {
            display.value = eval(display.value);
        } catch {
            display.value = "Error";
        }
    }
</script>

</body>
</html>
